version: '3.8'

services:
  mattermost:
    image: ${MATTERMOST_IMAGE:-ghcr.io/korjavin/mattermost-vendor:latest}
    container_name: ${MATTERMOST_CONTAINER_NAME:-mattermost}
    restart: unless-stopped
    depends_on:
      - mattermost-db
    networks:
      - internal
      - traefik_network
    volumes:
      - ${MATTERMOST_CONFIG_PATH:-./volumes/mattermost/config}:/mattermost/config:rw
      - ${MATTERMOST_DATA_PATH:-./volumes/mattermost/data}:/mattermost/data:rw
      - ${MATTERMOST_LOGS_PATH:-./volumes/mattermost/logs}:/mattermost/logs:rw
      - ${MATTERMOST_PLUGINS_PATH:-./volumes/mattermost/plugins}:/mattermost/plugins:rw
      - ${MATTERMOST_CLIENT_PLUGINS_PATH:-./volumes/mattermost/client/plugins}:/mattermost/client/plugins:rw
      - ${MATTERMOST_BLEVE_INDEXES_PATH:-./volumes/mattermost/bleve-indexes}:/mattermost/bleve-indexes:rw
    environment:
      TZ: ${TIMEZONE:-UTC}
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: postgres://${POSTGRES_USER:-mattermost}:${POSTGRES_PASSWORD}@mattermost-db:5432/${POSTGRES_DB:-mattermost}?sslmode=disable&connect_timeout=10
      MM_BLEVESETTINGS_INDEXDIR: /mattermost/bleve-indexes
      MM_SERVICESETTINGS_SITEURL: https://${MATTERMOST_HOST}
    security_opt:
      - no-new-privileges:true
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK_NAME:-traefik_default}"
      - "traefik.http.routers.mattermost.rule=Host(`${MATTERMOST_HOST}`)"
      - "traefik.http.routers.mattermost.entrypoints=websecure"
      - "traefik.http.routers.mattermost.tls.certresolver=${TRAEFIK_CERTRESOLVER:-myresolver}"
      - "traefik.http.services.mattermost.loadbalancer.server.port=8065"

  mattermost-db:
    image: ${POSTGRES_IMAGE:-ghcr.io/korjavin/mattermost-postgres-vendor:latest}
    container_name: ${DB_CONTAINER_NAME:-mattermost-db}
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      TZ: ${TIMEZONE:-UTC}
      POSTGRES_DB: ${POSTGRES_DB:-mattermost}
      POSTGRES_USER: ${POSTGRES_USER:-mattermost}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    security_opt:
      - no-new-privileges:true

  # Optional restic backup sidecar. Disabled by default — enable by adding
  # 'backup' to COMPOSE_PROFILES in your stack env (e.g. COMPOSE_PROFILES=backup).
  mattermost-backup:
    profiles: ["backup"]
    image: ${BACKUP_IMAGE:-ghcr.io/korjavin/mattermost-backup:latest}
    container_name: ${BACKUP_CONTAINER_NAME:-mattermost-backup}
    restart: unless-stopped
    depends_on:
      - mattermost-db
    networks:
      - internal
    volumes:
      - ${MATTERMOST_DATA_PATH:-./volumes/mattermost/data}:/data:ro
      - backup-cache:/cache
    environment:
      TZ: ${TIMEZONE:-UTC}
      PGHOST: mattermost-db
      POSTGRES_DB: ${POSTGRES_DB:-mattermost}
      POSTGRES_USER: ${POSTGRES_USER:-mattermost}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      RESTIC_REPOSITORY: ${RESTIC_REPOSITORY}
      RESTIC_PASSWORD: ${RESTIC_PASSWORD}
      RESTIC_CACHE_DIR: /cache
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      RESTIC_KEEP_DAILY: ${RESTIC_KEEP_DAILY:-7}
      RESTIC_KEEP_WEEKLY: ${RESTIC_KEEP_WEEKLY:-4}
      RESTIC_KEEP_MONTHLY: ${RESTIC_KEEP_MONTHLY:-6}
      # Set the credential pair matching your RESTIC_REPOSITORY backend:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      B2_ACCOUNT_ID: ${B2_ACCOUNT_ID:-}
      B2_ACCOUNT_KEY: ${B2_ACCOUNT_KEY:-}
    security_opt:
      - no-new-privileges:true

networks:
  internal:
    name: ${INTERNAL_NETWORK_NAME:-mattermost_internal}
  traefik_network:
    external: true
    name: ${TRAEFIK_NETWORK_NAME:-traefik_default}

volumes:
  db-data:
    name: ${DB_VOLUME_NAME:-mattermost_db-data}
  backup-cache:
    name: ${BACKUP_CACHE_VOLUME_NAME:-mattermost_backup-cache}
